plugins {
    id 'java'
	id "org.jetbrains.intellij" version "1.15.0"
}

group = 'org.logoce.lmf.editor'
version = '1.0-SNAPSHOT'

intellij {
	version = "2023.2.2"
	type = "IC"
	pluginName = "LMF-Editor"
}

patchPluginXml {
	sinceBuild.set("232")
	untilBuild.set("232.*")
}

repositories {
    mavenCentral()
}

dependencies {
	api project(":logoce.lmf.model")

    testImplementation platform('org.junit:junit-bom:5.9.1')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}

sourceSets {
	main {
		java.srcDirs += ['src/main/gen']
	}
}
