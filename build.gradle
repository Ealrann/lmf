buildscript {
	repositories {
		mavenLocal()
		mavenCentral()
	}
}

subprojects {

	apply plugin: 'java-library'

	java {
		sourceCompatibility = JavaVersion.VERSION_25
		targetCompatibility = JavaVersion.VERSION_25
	}

	tasks.withType(JavaCompile).configureEach {
		options.deprecation = true
	}

	repositories {
		mavenLocal()
		mavenCentral()
	}

	afterEvaluate {
		repositories {
			mavenLocal()
			mavenCentral()
		}
	}


}
