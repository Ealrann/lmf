buildscript {
	repositories {
		mavenLocal()
		mavenCentral()
	}
}

subprojects {

	apply plugin: 'java-library'

	java {
		sourceCompatibility = JavaVersion.VERSION_17
		targetCompatibility = JavaVersion.VERSION_17
	}

	repositories {
		mavenLocal()
		mavenCentral()
	}

	afterEvaluate {
		repositories {
			mavenLocal()
			mavenCentral()
		}
	}


}
